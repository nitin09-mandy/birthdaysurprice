<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <script>
        // Ensure consistent arrow function syntax
        const updateCanvas = () => {
            const canvas = document.getElementById('myCanvas');
            const ctx = canvas.getContext('2d');
            // Canvas drawing logic
        };
        
        // Update typeName function to prevent innerHTML vulnerability
        const typeName = (name) => {
            const displayName = document.getElementById('nameDisplay');
            // Use textContent to prevent XSS
            displayName.textContent = name;
        };

        const resizeCanvas = () => {
            const canvas = document.getElementById('myCanvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            updateCanvas();
        };

        window.addEventListener('resize', resizeCanvas);
    </script>
</head>
<body>
    <canvas id="myCanvas"></canvas>
    <input type="text" id="nameInput" placeholder="Enter your name" />
    <button onclick="typeName(document.getElementById('nameInput').value)">Submit</button>
    <div id="nameDisplay"></div>
</body>
</html>
